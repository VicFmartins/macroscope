spring:
  application:
    name: macroscope

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:macroscope}}
    username: ${DB_USER:macroscope}
    password: ${DB_PASSWORD:macroscope_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc.time_zone: UTC

  jackson:
    time-zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      url: ${REDIS_URL:redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}}
      timeout: 2000ms

server:
  port: ${PORT:${SERVER_PORT:8080}}
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: ${HEALTH_SHOW_DETAILS:when_authorized}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

macroscope:
  apis:
    world-bank-base-url: https://api.worldbank.org/v2
    exchange-rates-base-url: https://v6.exchangerate-api.com/v6
    rest-countries-base-url: https://restcountries.com/v3.1
    gemini-base-url: https://generativelanguage.googleapis.com
    exchange-rates-api-key: ${EXCHANGE_RATES_API_KEY:}
    gemini-api-key: ${GEMINI_API_KEY:}

  scoring:
    default-profile: MODERATE

  insights:
    model: ${INSIGHTS_MODEL:gemini-2.5-flash}
    cache-ttl-seconds: ${INSIGHTS_CACHE_TTL_SECONDS:43200}
    timeout-seconds: ${INSIGHTS_TIMEOUT_SECONDS:20}

  collection:
    interval-ms: ${COLLECTION_INTERVAL_MS:21600000}
    cache-ttl-seconds: 21600

  web:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}

logging:
  level:
    com.macroscope: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
