name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: macroscope-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Build and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and test backend
        run: mvn -B verify

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_BASE_URL: https://api.macroscope
      NEXT_PUBLIC_SITE_URL: https://app.macroscope
      CI_DEPLOY: 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate frontend environment
        run: npm run validate-env

      - name: Build frontend
        run: npm run build

  validate-deploy-config:
    name: Validate Deployment Secrets
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - backend
      - frontend
    runs-on: ubuntu-latest
    env:
      RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
      RAILWAY_SERVICE_ID: ${{ vars.RAILWAY_SERVICE_ID }}
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
    steps:
      - name: Fail fast when deployment configuration is incomplete
        run: |
          missing=0
          for secret_name in RAILWAY_API_TOKEN VERCEL_TOKEN; do
            if [ -z "${!secret_name}" ]; then
              echo "::error::Missing GitHub secret: ${secret_name}"
              missing=1
            fi
          done
          for var_name in RAILWAY_PROJECT_ID RAILWAY_SERVICE_ID VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!var_name}" ]; then
              echo "::error::Missing GitHub Actions variable: ${var_name}"
              missing=1
            fi
          done
          exit "${missing}"

  deploy-backend:
    name: Deploy Backend to Railway
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - validate-deploy-config
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
      RAILWAY_SERVICE_ID: ${{ vars.RAILWAY_SERVICE_ID }}
      RAILWAY_ENVIRONMENT: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy backend
        run: npx @railway/cli up --service "${RAILWAY_SERVICE_ID}" --project "${RAILWAY_PROJECT_ID}" --environment "${RAILWAY_ENVIRONMENT}" --detach --ci

  deploy-frontend:
    name: Deploy Frontend to Vercel
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - deploy-backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Pull Vercel environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel pull --yes --environment=production --token="${VERCEL_TOKEN}"

      - name: Build frontend deployment bundle
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel build --prod --token="${VERCEL_TOKEN}"

      - name: Deploy frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel deploy --prebuilt --prod --token="${VERCEL_TOKEN}"
